{% extends "base.html" %}
{% block title %}Импорт — очередь{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Очередь импорта</h2>
    <a href="/import/" class="btn btn-outline-secondary btn-sm">← Назад</a>
</div>

<div style="max-width:700px">
    <div id="queue-container">
        <p class="text-muted">Подключение...</p>
    </div>
    <div class="mt-3 text-muted small">
        Файлы загружаются последовательно. Можно закрыть страницу — импорт продолжится в фоне.
    </div>
</div>

<script>
(function() {
    var target = document.getElementById("queue-container");
    var es     = new EventSource("/import/progress/queue");
    var closed = false;

    es.onmessage = function(e) {
        if (closed) return;
        target.innerHTML = e.data;
    };

    es.onerror = function() {
        if (!closed) {
            closed = true;
            es.close();
            // Добавляем ссылку на отчёты когда SSE закрылся
            var link = document.createElement("div");
            link.className = "mt-3";
            link.innerHTML = '<a href="/reports/" class="btn btn-success">Перейти к отчётам →</a>'
                           + ' <a href="/import/" class="btn btn-outline-secondary ms-2">К импорту</a>';
            document.querySelector("div[style]").appendChild(link);
        }
    };
})();
</script>
{% endblock %}
